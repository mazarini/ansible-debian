---
# tasks for fail2ban modular setup in jail.d

- name: Install fail2ban package
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: yes

- name: "Fail2ban: Deploy local jail configuration"
  ansible.builtin.template:
    src: jail.ssh.conf.j2
    dest: /etc/fail2ban/jail.d/ssh.conf
    owner: root
    group: root
    mode: '0644'
  notify: "Restart fail2ban"

- name: Ensure fail2ban is enabled and started
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started